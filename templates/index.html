<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillai Center Assistant</title>
    <link rel="stylesheet" href="/static/chatbot.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a1625;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .night-sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a1625 0%, #111827 100%);
            z-index: 1;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white 1px, transparent 1.5px),
                radial-gradient(white 1.2px, transparent 2px);
            background-size: 180px 180px, 320px 320px;
            background-position: 0 0, 40px 60px;
            opacity: 0.9;
            z-index: 2;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .moon {
            position: absolute;
            top: 60px;
            right: 80px;
            width: 110px;
            height: 110px;
            background: #f4f1e9;
            border-radius: 50%;
            box-shadow: 
                0 0 30px #f4f1e9,
                0 0 60px #e8d9a0;
            z-index: 3;
        }

        .moon::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 25px;
            width: 18px;
            height: 18px;
            background: #d4c9a8;
            border-radius: 50%;
            box-shadow: 
                35px 15px 0 #d4c9a8,
                15px 45px 0 #d4c9a8,
                50px 40px 0 #d4c9a8;
        }
    </style>
</head>
<body>

    <!-- Night Sky Background -->
    <div class="night-sky"></div>
    <div class="stars"></div>
    <div class="moon"></div>

    <!-- Chatbot Widget -->
    <script src="/static/chatbot.js"></script>

</body>
</html>
